front:
  text: 御題南宋都城紀勝録
  hash: sha256:97cc16de045acf94161ee9d4271bcb378ea448c49b94d3f29681e572ea0d866a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0117_WYG_000-1a, image: WYG0590/WYG0590-0001a.png}
body:
  text: 宋自南渡之後半壁僅支而君若臣溺於宴安不以恢復為念西湖歌舞日夕流連豈知剩水殘山已無足恃顧有若將終焉之志其去燕巢危幕幾何矣而耐得翁為此編惟盛稱臨安之明秀謂民物康阜過京師十倍又謂中興百年餘太平日久視前又過十數倍其昧於安危盛衰之機亦甚矣哉然彼或窺見廟堂之上不能振作為此以逢其所欲抑亦知其書流傳必貽笑於後世故隱其姓名而托於子虛烏有之倫乎不然則既操子墨寧未讀孟堅兩都賦托諷諫以立言而為是違道鋪張也覽是編其時事可知因題句並序如右一線南遷已甚為徽欽北去竟忘之正當嘗膽卧薪日却作觀山玩水時後市前朝誇富庶歌樓酒館鬭笙絲咄哉耐得翁傳録可似蘭臺兩賦奇欽定四庫全書史部十一都城紀勝地理類八雜記之屬提要臣等謹案都城紀勝一卷不著撰人名氏但自署曰耐得翁其書成於端平二年皆記杭州瑣事分十四門曰市井曰諸行曰酒肆曰食店曰茶坊曰四司六局曰瓦舍衆伎曰社㑹曰園苑曰舟船曰鋪席曰坊苑曰閒人曰三教外地叙述頗詳可以見南渡以後土俗民風之大略考髙宗駐驆臨安謂之行在雖湖山宴樂巳無志於中原而其名未改故乾道中周淙修臨安志於宫苑及百官曹署尚著舊稱潛說友志亦因之此書直題曰都城蓋官司不過案牘流傳僅存故事民間則耳目濡染久若定居矣又史載端平元年孟珙㑹元師滅金是時舊敵已去新釁未形相與燕雀處堂無復逺慮是書作於端平二年正文武恬嬉茍且宴樂之日故競趨靡麗以至於斯作是書者既欲以富盛相誇又自知茍安可愧故諱而自匿不著其名伏讀御題仰見聖鑒精深洞其微曖起作者而問之當亦無所置詞以其中舊迹遺聞尚足以資考核而宴安鴆毒亦足以垂戒千秋故糾正其失以示昭鑑而書則仍録存之焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
