body:
  text: 都城紀勝井市自犬內和寧門外新路南北早間珠玉珍異及花果時新海鮮野味奇器天下所無者悉集於此以至朝天門清河坊中瓦前灞頭官巷口棚心衆安橋食物店鋪人煙浩穰其夜市除大內前外諸處亦然惟中瓦前最勝撲賣奇巧器皿百色物件與日間無異其餘坊巷市井買賣關撲酒樓歌館直至四鼓後方靜而五鼓朝馬將動其有趁賣早市者復起開張無論四時皆然如遇元宵猶盛排門和買民居作觀玩幕次不可勝紀隆興間髙廟與六宫等在中瓦相對今修內司染坊看位觀孝宗皇帝孟享回就觀燈買市簾前排列內侍官帙行堆垜見錢宣押市食歌叫支賜錢物或有得金銀錢者是時尚有京師流寓經紀人市店遭遇者如李婆婆羮南瓦子張家糰子若遇車駕行幸春秋社會等連簷並壁幕次排列此外如執政府牆下空地舊名南倉前諸色路岐人在此作場尤為駢闐又皇城司馬道亦然候潮門外殿司教場夏月亦有絶伎作場其他街市如此空隙地段多有作場之人如大瓦肉市炭橋藥市橘園亭書房城東菜市城北米市其餘如五間樓福客糖果所聚之類未易縷舉諸行市肆謂之行音杭者因官府科索而得此名不以其物小大但合充用者皆置為行雖醫卜亦有職醫尅擇之差占則與市肆當行同也內亦有不當行而借名之者如酒行食飯行是也又有名為團者如城南之花團泥路之青果團江下之鮝團後市街之柑子團是也其他工伎之人或名為作如篦刃作腰帶作金銀鍍作鈒作是也又有異名者如七寶謂之骨董行浴堂謂之香水行是也大抵都下萬物所聚如官巷之花行所聚花朵冠梳叉環領抹極其工巧古所無也都下市肆名家馳譽者如中瓦前皂兒水雜賣場前甘豆湯如戈家蜜棗兒官巷口光家羮大瓦子水果子夀慈宫前熟肉錢塘門外宋五嫂魚羮湧金門灌肺中瓦前職家羊飯彭家油靴南瓦宣家台衣張家糰子候潮門顧四笛大瓦子丘家篳篥之類酒肆除官庫子庫腳店之外其餘皆謂之拍戶有茶飯店謂兼賣食次下酒是也但要索喚及時食品知處不然則酒家亦有單于牌面點選也包子酒店謂賣鵝鴨包子四色兜子腸血粉羮魚子魚白之類此處易為支費宅子酒店謂外門面裝飾如仕宦宅舍或是舊仕宦宅子改作者花園酒店城外多有之或城中效學園館裝折直賣店謂不賣食次也散酒店謂零賣百單四七十七五十二三十八并折賣外坊酒門首亦不設油漆杈子多是竹柵布幕謂之打碗遂言只一杯也却不甚尊貴非髙人所往菴酒店謂有娼妓在內可以就歡而於酒閣內暗藏卧牀也門首紅梔子燈上不以晴雨必用箬㔶蓋之以為記認其他大酒店娼妓只伴坐而巳欲買歡則多往其居羅酒店在山東河北有之今借名以賣渾頭遂不貴重也酒家事物門設紅杈子緋緣簾貼金紅紗梔子燈之類舊傳因五代郭髙祖遊幸汴京潘樓至今成俗酒閣名為廳院若樓上則又或名為山一山二山三之類牌額寫過山非特有山謂酒力髙逺也大凡入店不可輕易登樓上閣恐飲燕淺短如買酒不多則只就樓下散坐謂之門牀馬道初坐定酒家人先下看菜問買多少然後别換菜蔬亦有生疏不慣人便忽下筯被笑多矣大抵店肆飲酒在人出著如何只如食次謂之下湯水其錢少止百錢五千者謂之小分下酒若命妓則此輩多是虛駕驕貴索喚髙價細食全要出著經慣不被所侮也如煮酒或有先索到十瓶逐旋開飲少頃只飲五六瓶佳者其餘退回亦是搜弊之一訣官庫則東酒庫曰大和樓西酒庫曰金文庫有樓曰西樓舊有樓攻愧書榜後為好奇者取去南酒庫曰升暘宫樓曰和樂樓北酒庫曰春風樓正南樓對吳越兩山南上酒庫曰和豐樓西子庫曰豐樂樓在今湧金門外乃舊楊和王之聳翠樓後張定叟兼領庫事取為官庫正跨西湖對兩山之勝西子庫曰太平樓中酒庫曰中和樓南外庫在便門外東外庫在崇新門外此外庫在湖州市有樓曰春融樓其他則有西溪并赤山九里松酒庫其中和和樂和豐並在御街其太平大和因回祿後其樓悉廢若欲賞妓往官庫中點花牌其酒家人亦多隱庇推托須是親識其妓及以利委之可也天府諸酒庫每遇寒食節前開沽煮酒中秋節前後開沽新酒各用妓弟乘騎作三等裝束一等特髻大衣者二等冠子裙背者三等冠子衫子襠袴者前有小女童等及諸社會動大樂迎酒樣赴府治呈作樂呈伎蓻雜劇三盞退出於大街諸處迎引歸庫食店都城食店多是舊京師人開張如羊飯店兼賣酒凡點索食次大要及時如欲速飽則前重後輕如欲遲飽則前輕後重重者如頭羹者石髓飯大骨飯泡飯軟羊浙米飯輕如煎事件托胎嬭房肚尖子肚胘腰之類南食店謂之南食川飯分茶蓋因京師開此店以備南人不服北食者今既在南則其名誤矣所以專賣麵食魚肉之屬如鋪羊麵麵盫生麵桐薑撥刀鹽煎鯙魚皮麵抹肉淘子肉虀淘汁棊子蝦燥麵帶煎下至撲刀雞鵝麵家常三刀麵皆是也若欲索供逐店自有單子牌面飽􅨋店專賣大燠􅨋燥子䬣并餛飩菜麵店專賣菜麵經虀淘或血臟麵子帶有撥刀素棊冷淘此處不甚尊貴非待客之所素食店賣素簽乳頭羮河麵食繭鯤脯􅯢元魚凡麩筍乳菌飲食充齋素筵會之備衢州飯店又謂之悶飯店蓋盫飯也專賣家常蝦魚粉羮魚麵蝴蝶之屬欲求粗飽者可往惟不宜尊貴人市食點心涼暖之月大槩多賣豬羊雞煎煠剗子四色饅頭灌脯灌腸紅燠薑豉屬蹄子肘件之夜間頂盤挑架者如鵪鶉餶飿兒餅焦鎚羊脂韭餅餤少春餅餈旋餅炙沙糰子宜利獻糕犯子之類遍路歌叫都人固自為常若逺方僻土之人乍見之則以為稀遇其餘店鋪夜市不可細數如豬胰胡餅自中興以來只東京臟三家一分每夜在太平坊巷口近來又或有效之者大抵都下買物多趨有名之家如昔時之內前下家從食街市王宣旋餅望仙橋糕麋是也如酪面亦只後市街賣酥賀家一分每箇五百貫以新樣油餅兩枚夾而食之此北食也其餘諸行百戶亦如此市食有名存而實亡者如瓠羮是也亦有名亡而實存者如甕羮今號虀麵是也又有誤名之者如呼熟肉為白肉是也蓋白肉白是砧壓去油者又有專賣小兒戲劇糖果如打嬌惜蝦鬚糖宜娘打鞦韆稠餳之類茶坊大茶坊張挂名人書畫在京師只熟食店挂畫所以消遣久待也今茶坊皆然冬天兼賣擂茶或賣鹽豉湯暑天兼賣梅花酒紹興間用鼓樂吹梅花酒曲用旋杓如酒肆間正是論角如京師量賣茶樓多有都人子弟占此會聚習學樂器或唱叫之類謂之挂牌兒人情茶坊本非以茶湯為正但將此為由多下茶錢也又有一等專是娼妓弟兄打聚處又有一等專是諸行借工賣伎人會聚行老處謂之市頭水茶坊乃娼家聊設桌凳以茶為由後生輩甘於費錢謂之乾茶錢提茶瓶即是趁赴充茶酒人尋常月旦望每日與人傳語往還或講集人情分子又有一等是街司人兵以此為名乞見錢物謂之齪茶四司六局官府貴家置四司六局各有所掌故筵席排當凡事整齊都下街市亦有之常時人户每遇禮席以錢倩之皆可辦也帳設司專掌仰塵繳壁卓幃搭席簾幕罘罳屏風繡額書畫簇子之類專掌打料批切烹炮下食調和節次茶酒司專掌賓客茶湯暖蕩篩酒請坐咨席開盞歇坐揭席迎送應干節次臺盤司專掌托盤打送齎擎勸酒出食接盞等事果子局専掌裝簇盤飣看果時果準備勸酒蜜煎局專掌糖蜜花果鹹酸勸酒之屬菜蔬局專掌甌飣菜蔬糟藏之屬油燭局專掌燈火照耀立臺剪燭壁燈燭籠裝香簇炭之類香藥局專掌藥楪香毬火箱香餅聽候索喚諸般奇香及醒酒湯藥之類排辦局專掌挂畫插花掃灑打渲拭抹供過之事凡四司六局人祇應慣熟便省賔主一半力故常諺曰燒香點茶挂畫插花四般間事不許戾家若其失忘支節皆是祇應等人不學之過只如結席喝犒亦合依次第先厨子次茶酒三樂人瓦舍衆伎瓦者野合易散之意也不知起於何時但在京師時甚為士庶放蕩不羈之所亦為子弟流連破壞之地散樂傳學教坊十三部唯以雜劇為正色舊教坊有篳篥部大鼓部杖鼓部拍板色笛色琵琶色箏色方響色笙色舞旋色歌板色雜劇色參軍色色有色長部有部頭上有教坊使副鈐轄都管掌儀範者皆是命官其諸部分紫緋緑三等寬衫兩下各垂黃義襴雜劇部又戴諢裹其餘只是帽子幞頭以次又有小兒隊并女童採蓮隊又别有釣客班今四孟隨在駕後乘馬動樂者是其故事也紹興三十一年省廢教坊之後每遇大宴則撥差臨安府衙前樂等人充應屬修內司教樂所掌管教坊大使在京師時有孟角毬曽撰雜劇本子又有葛守成撰四十大曲詞又有丁仙現捷才知音紹興間亦有丁漢弼楊國祥雜劇中末泥為長每四人或五人為一場先做尋常熟事一段名曰艷段次做正雜劇通名為兩段末泥色主張引戲色分付副淨色發喬副末色打諢又或添一人裝孤其吹曲破斷送者謂之把色大抵全以故事世務為滑稽本是鑒戒或隱為諌諍也故從便跣露謂之無過蟲諸宫調本京師孔三傳編撰傳奇靈怪八曲説唱細樂比之教坊大樂則不用大鼓杖鼓羯鼓頭管琵琶箏也每以簫管笙􅌙稽琴方響之類合動小樂器只一二人合動也如雙韻合阮咸稽琴合簫管鍬琴合葫蘆琴單撥十四弦吹賺動鼓板渤海樂一拍子至於拍番鼓子敲水盞鑼板和鼓兒皆是也今街市有樂人三五為隊專趕春場看潮賞芙蓉及酒坐祇應與錢亦不多謂之荒鼓板清樂比馬後樂加方響笙笛用小提鼓其聲亦輕細也淳熙間德夀宫龍笛色使臣四十名每中秋或月夜令獨奏龍笛聲聞於人間真清樂也唱叫小唱謂執板唱慢曲曲破大率重起輕殺故曰淺斟低唱與四十大曲舞旋為一體今瓦市中絶無嘌唱謂上鼓面唱令曲小詞驅駕虛聲縱弄宫調與叫果子唱耍曲兒為一體本只街市今宅院往往有之叫聲自京師起撰因市井諸色歌吟賣物之聲採合宫調而成也若加以嘌唱為引子次用四句就入者謂之下影帶無影帶者名散叫若不上鼓面祇敲盞者謂之打拍唱賺在京師口有纒令纒達有引子尾聲為纒令引子後只以兩腔遞且循環間用者為纒達中興後張五牛大夫因聽動鼓板中又有四片太平令或賺鼓板即今拍板大篩揚處是也遂撰為賺賺者悮賺之義也令人正堪美聽不覺已至尾聲是不宜為片序也今又有覆賺又且變花前月下之情及鐵騎之類凡賺最難以其兼慢曲曲破大曲嘌唱耍令番曲叫聲諸家腔譜也雜扮或名雜旺又名紐元子又名技和乃雜劇之散段在京師時村人罕得入城遂撰此端多是借裝為山東河北村人以資笑今之打和鼓撚梢子散耍皆是也百戲在京師時各名左右軍並是開封府衙前樂營相撲爭交謂之角抵之戲别有使拳自為一家與相撲曲折相反而與軍頭司大士相近也踢弄每大禮後宣赦時搶金雞者用此等人上竿打筋斗踏蹺打交輥脫索裝神鬼抱鑼舞判舞斫刀舞蠻牌舞劒與馬打毬并教船水鞦韆東西班野戰諸軍馬上呈驍騎北人乍栁街市轉焦䭔為一體雜手藝皆有巧名踢瓶弄碗踢磬弄花鼓捶踢墨筆弄毬子桚築毬弄斗打硬教蟲蟻及魚弄熊燒煙火放爆仗火戲兒水戲兒聖花撮藥藏壓藥法傀儡壁上睡小則劇術射穿弩子打彈攢壺瓶即古之投壺手影戲弄頭錢變線兒寫沙書改字弄懸絲傀儡起於陳平六奇解圍杖頭傀儡水傀儡肉傀儡以小兒後生輩為之凡傀儡敷演煙粉靈怪故事鐵騎公案之類其話本或如雜劇或如崖詞大抵多虛少實如巨靈神朱姬大仙之類是也影戲凡影戲乃京師人初以素紙雕鏃後用彩色裝皮為之其話本與講史書者頗同大抵真假相半公忠者雕以正貌姦邪者與之醜貌蓋亦寓褒貶於市俗之眼戲也説話有四家一者小説謂之銀字兒如煙粉靈怪傳奇説公案皆是搏刀趕捧及發迹變泰之事説鐵騎兒謂士馬金鼓之事説經謂演説佛書説參請謂賔主參禪悟道等事講史書講説前代書史文傳興廢爭戰之事最畏小説人蓋小説者能以一朝一代故事頃刻間提破合生與起令隨令相似各占一事商謎舊用鼓板吹賀聖朝聚人猜詩謎字謎戾謎社謎本是隱語有道謎來客念隱語説謎又名打謎正猜來客索猜下套商者以物類相似者譏之人名對智貼套貼智思索走智改物類以困猜者橫下許旁人猜問因商者喝問句頭調爽假作難猜以定其智社會文士則有西湖詩社此社非其他社集之比乃行都士夫及寓居詩人舊多出名士隱語則有南北垕齋西齋皆依江右謎法習詩之流萃而為齋又有蹴鞠打毬社川弩射弓社奉佛則有上天竺寺光明會皆城內外富家助備香花燈燭齋襯施利以備本寺一嵗之用又有茶湯會此會每遇諸山寺院作齋會則往彼以茶湯助緣供應會中善人城中太平興國傳法寺淨業會每月十七日則集男士十八日則集女人入寺諷經聽法嵗終則建藥師會七晝夜西湖每嵗四月放生會其餘諸寺經會各有方所日分每嵗行都神祠誕辰迎獻則有酒行錦體社八仙社漁父習間社神鬼社小女童像生叫聲社遏雲社奇巧飲食社花果社七寶考古社皆中外奇珍異貨馬社豪貴緋緑清樂社此社風流最勝園苑在城則有萬松嶺內貴王氏富覽園三茅觀東山梅亭慶夀菴禇家塘御東園係瓊華園清湖北慈明殿園楊府秀芳園張府北園楊府風雲慶會閣城東新開門外則有東御園今名富景園五栁御園城西清波錢湖門外聚景御園舊名西園張府七位曹園南山長橋則西有慶樂御園舊名南園淨慈寺前屏山御園雷峰塔前張府真珠園內有髙寒堂極華麗寺園霍家園方家溪劉園北山則有集芳御園四聖延祥御園西湖勝地惟此為最下竺寺御園錢塘門外則有栁巷楊府雲洞園西園劉府玉壺園四并亭園楊府水閣又具美園又飲緑亭裴府山濤園趙秀王府水月園張府凝碧園孤山路口內貴張氏總宜園德生堂放生亭新建白公竹閣袁樞尹天府就寺重建沿蘇堤新建先賢堂園本裴氏園袁樞新建又有三賢堂園本新亭子袁樞於水仙王廟移像新建九里松嬉遊園天府酒庫湧金門外則有顯應觀西齋堂張府泳澤園慈明殿環碧園舊是清暉御園大小漁莊其餘貴府富室大小園館猶有不知其名者城南嘉會門外則有玉津御園虜使時射弓所又有就包山作園以植桃花都人春時最為勝賞惟內貴張侯壯觀園為最城北北關門外則有趙郭家園東西馬城諸園乃都城種植奇異花木處舟行都左江右湖河運通流舟船最便而西湖舟船大小不等有一千料約長五十餘丈中可容百餘客五百料約長三二十丈可容三五十餘客皆奇巧打造雕欄畫棟行運平穩如坐平地無論四時常有遊玩人賃假舟中所須器物一一畢備但朝出登舟而飲暮則徑歸不勞餘力惟支費錢耳其有貴府富室自造者又特精緻耳西湖春中浙江秋中皆有龍舟爭標輕捷可觀有金明池之遺風而東浦河亦然惟浙江自孟秋至中秋間則有弄潮者持旗執竿狎戲波濤中甚為奇觀天下獨此有之鋪席都城天街舊自清河坊南則呼南瓦北謂之界北中瓦前謂之五花兒中心自五間樓北至官巷南御街兩行多是上户金銀鈔引交易鋪僅百餘家門列金銀及見錢謂之看垜錢此錢備入納算請鈔引並諸作匠爐韝紛紜無數自融和坊北至市南坊謂之珠子市頭如遇買賣動以萬數間有府第富室質庫十數處皆不以貫萬收質其他如名家綵帛鋪堆上細匹段而錦綺縑素皆諸處所無者又如廂王家絨線鋪自東京流寓今於御街開張數鋪亦不下萬計又有大小鋪席皆是廣大物貨如平津橋沿河布鋪扇鋪溫州漆器鋪青白碗器鋪之類且夫外郡各以一物稱最如無紗洪扇吳錢之類都會之下皆物所聚之處况夫人物繁夥客販往來至於故楮羽毛扇牌皆有行鋪其餘可知矣坊院栁永咏錢塘詞云參差一萬人家此元豐以前語也今中興行都巳百餘年其戶口蕃息僅百萬餘家者城之南西北三處各數十里人煙生聚市井坊陌數日經行不盡各可比外路一小小州郡足見行都繁盛而城中北關水門內有水數十里曰白洋湖其富家於水次起迭塌坊十數所每所為屋千餘間小者亦數百間以寄藏都城店鋪及客旅物貨四維皆水亦可防避風燭又免盜賊甚為都城富室之便其他州郡無此雖荆南沙市太平州黃池皆客商所聚亦無此等坊院間人本食客也古之孟嘗門下中下等人但不著業次以間事而食於人者有一等是無成子弟失業次人頗能知書寫字撫琴下碁及善音樂藝俱不精專陪涉富貴家子弟遊宴及相伴外方官員到都幹事其猥下者為妓家書寫簡帖取送之類又有專以參隨服事為生舊有百事皆能者如紐元子學像生動樂器雜手藝唱叫白詞相席打令傳言送語弄水使拳之類並是本色又有專為棚頭又謂之習間凡擎鷹駕鷂調鵓鴿養鵪鶉鬬雞賭博落生之類又有是刀鑷手作人長於此態故謂之涉兒取過水之意也此等刀鑷專攻街市皂院取奉郎君子弟幹當雜事説合交易等又有趕趁唱喏者探聽妓館人客及遊湖賞玩所在專以獻香送勸為由覔錢贍家大抵此輩若顧之則貪婪不顧之則強顔取奉多呈本事必得而後巳但在出著發放如何也三教外地都城內外自有文武兩學宗學京學縣學之外其餘鄉校家孰舍館書會每一里巷須一二所弦誦之聲往往相聞遇大比之嵗間有登第補中舍選者凡佛寺自諸大禪剎如靈隱光孝等寺律寺如明慶靈芝等寺教院如大傳法慧林慧因等各不下百數所之外又有僧尼廨院菴舍白衣社會道場奉佛處所不可勝紀若大寺院有所營修則於此地招集前去助緣其間有精修能事者凡道流自御前香火太乙宫延祥觀等及諸宫觀道館之外則有諸府第道堂如靈應希夷之類道院皆係捨俗道人及接待外路名山洞府往來髙士而時有神仙應緣現迹異人自有紀載爾都城紀勝
